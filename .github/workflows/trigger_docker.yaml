name: 触发构建

on:
  push:
    branches:
      - main  # 仅在 main 分支推送或合并时触发

jobs:
  build:
    runs-on: ubuntu-latest  # 改为最新的 Ubuntu 版本
    steps:
      - name: Trigger BUILD
        env:
          TOKEN: ${{ secrets.MY_ACCESS_TOKEN }}
        run: |
          curl -X POST \
          -H "Authorization: token $TOKEN" \
          -H "Accept: application/vnd.github.everest-preview+json" \
          "https://api.github.com/repos/nextpt/action/dispatches" \
          -d '{"event_type": "nanobot_event", "client_payload": {"message": "updated!"}}'
